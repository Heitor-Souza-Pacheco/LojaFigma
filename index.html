<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- LEFT -->
  <section class="left">
    <div class="left-inner">
      <div class="brand">Login<span></span></div>
      <p class="tagline">Continue suas compras<br>conosco!</p>
      <div class="dots">
        <i></i><i></i><i></i>
      </div>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="right">
    <div class="card">
      <h1 class="card-title">Faça login na sua<br>conta</h1>

      <div class="form-group">
        <label for="nome">Nome</label>
        <div class="input-wrap">
          <input type="text" id="nome" placeholder="Seu nome de usuário" autocomplete="username"/>
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
          <button class="eye-btn" type="button" aria-label="Mostrar senha" onclick="toggleSenha(this)">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-footer">
        <a href="inicio.html" class="btn-login">Entrar</a>
        <p class="signup-link">É novo aqui? <a href="cadastro.html">Crie sua conta</a></p>
      </div>
    </div>
  </section>
</body>
</html>
