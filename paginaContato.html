<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodePhone - Contato</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="paginaContato.css"/>
</head>
<body>

  <header class="cabecalho">
    <a href="inicio.html" class="logo">CodePhone</a>

    <nav class="menu-links">
      <a href="gradePorduto.html">Todos os celulares</a>
      <a href="paginaContato.html">Contato</a>
      <a href="sobre.html">Sobre nós</a>
    </nav>

    <a href="busca.html" class="barra-pesquisa">
      <span class="icone-menu">☰</span>
      <input type="text" placeholder="Buscar produtos..." readonly tabindex="-1"/>
      <span class="icone-busca">🔍</span>
    </a>

    <div class="icones-nav">
      <a href="carrinho.html" class="icone-carrinho">🛒</a>
      <a href="index.html" class="icone-perfil">👤</a>
    </div>
  </header>

  <section class="banner-contato">
    <h1>Entre em contato</h1>
  </section>

  <main class="secao-formulario">
    <p class="subtitulo-formulario">Deixe sua mensagem<br>ou sugestão para nós</p>

    <form class="formulario-contato">
      <div class="grupo-campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome"/>
      </div>

      <div class="grupo-campo">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email"/>
      </div>

      <div class="grupo-campo">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" rows="5"></textarea>
      </div>
    </form>
  </main>

  <footer class="rodape">
    <span class="rodape-texto">Todos os direitos reservados ©</span>
    <div class="rodape-icones">
      <a href="#">LinkedIn</a>
      <a href="#">GitHub</a>
      <a href="#">Instagram</a>
    </div>
  </footer>

</body>
</html>
