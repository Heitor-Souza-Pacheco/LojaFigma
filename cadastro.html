<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="cadastro.css"/>
</head>
<body>

  <section class="esquerda">
    <div class="conteudo-esquerda">
      <div class="marca">Cadastro<span></span></div>
      <p class="slogan">Comece suas compras<br>conosco!</p>
      <div class="pontos">
        <i></i><i></i><i></i>
      </div>
    </div>
  </section>

  <section class="direita">
    <div class="cartao">
      <h1 class="titulo-cartao">Crie a sua conta<br>agora!</h1>

      <div class="grupo-campo">
        <label for="nome">Nome</label>
        <div class="campo-input">
          <input type="text" id="nome" placeholder="Seu nome de usuário"/>
        </div>
      </div>

      <div class="grupo-campo">
        <label for="senha">Senha</label>
        <div class="campo-input">
          <input type="password" id="senha" placeholder="••••••••"/>
          <button class="botao-olho" type="button" onclick="toggleSenha(this)">👁</button>
        </div>
      </div>

      <div class="rodape-formulario">
        <button class="botao-criar" type="button">Criar</button>
        <a href="index.html" class="botao-voltar">Voltar</a>
      </div>
    </div>
  </section>

  <script>
  function toggleSenha(btn) {
    var input = btn.parentElement.querySelector('input');
    if (input.type === 'password') {
      input.type = 'text';
    } else {
      input.type = 'password';
    }
  }
  </script>
</body>
</html>
